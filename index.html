<!-- بسم الله الرحمن الرحيم -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Sakina — سكينة</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f0e6;--fg:rgba(40,32,24,.9);--dim:rgba(70,60,45,.5);--accent:#2c3e6b;--font:'Inter',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font-family:var(--font);font-size:16px;font-weight:300;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem}
h1{font-size:clamp(1.8rem,5vw,3rem);font-weight:200;letter-spacing:-.02em;text-align:center}
.arabic{font-size:clamp(1.2rem,3vw,2rem);color:var(--dim);margin-bottom:.5rem;text-align:center}
.subtitle{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:1.5rem;text-align:center}
.player{width:100%;max-width:700px;margin:1rem 0}
.surah-select{width:100%;padding:.6rem .8rem;font-family:var(--font);font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;background:rgba(44,62,107,.06);border:1px solid rgba(44,62,107,.15);color:var(--fg);cursor:pointer}
.viz-row{display:flex;gap:12px;width:100%;max-width:900px;margin:1rem 0;flex-wrap:wrap}
.viz-panel{flex:1;min-width:300px;position:relative;border:1px solid rgba(44,62,107,.1)}
.viz-panel canvas{display:block;width:100%;height:400px}
.viz-panel img{display:block;width:100%;height:400px;object-fit:contain;background:var(--bg)}
.viz-label{position:absolute;top:6px;left:8px;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
.verse-display{text-align:center;font-size:clamp(.9rem,2.5vw,1.3rem);color:var(--fg);margin:1rem 0;min-height:1.5em;direction:rtl;line-height:1.8;max-width:700px}
.controls{display:flex;gap:1rem;align-items:center;justify-content:center;margin:.8rem 0}
.controls button{padding:.5rem 1.2rem;font-family:var(--font);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;background:var(--accent);color:var(--bg);border:none;cursor:pointer}
.controls button:hover{opacity:.8}
.scrubber{width:100%;max-width:700px;display:flex;align-items:center;gap:8px;margin:.5rem 0}
.scrubber input{flex:1}
.scrubber span{font-size:.6rem;letter-spacing:.08em;color:var(--dim);min-width:80px}
.status{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);text-align:center;margin:.5rem 0}
</style>
</head>
<body>

<div class="arabic">سكينة</div>
<h1>Sakina</h1>
<p class="subtitle">The neural landscape of Quran recitation</p>

<div class="player">
  <select class="surah-select" id="surahSelect">
    <option value="1">1 · Al-Fatiha — The Opening</option>
    <option value="36">36 · Ya-Sin — The Heart of the Quran</option>
    <option value="55">55 · Ar-Rahman — The Most Merciful</option>
    <option value="67">67 · Al-Mulk — The Sovereignty</option>
    <option value="112">112 · Al-Ikhlas — The Sincerity</option>
    <option value="113">113 · Al-Falaq — The Daybreak</option>
    <option value="114">114 · An-Nas — Mankind</option>
  </select>
</div>

<div class="controls">
  <button id="btnPlay" onclick="window._togglePlay()">▶ Listen</button>
</div>

<div class="viz-row">
  <div class="viz-panel">
    <canvas id="brain3dCanvas"></canvas>
    <div class="viz-label">3D BRAIN · TRIBE V2</div>
  </div>
  <div class="viz-panel">
    <img id="brainFrame" src="frames/frame-000.png" alt="Brain render">
    <div class="viz-label">TRIBE V2 RENDER · VALIDATION</div>
  </div>
</div>

<div class="verse-display" id="verseDisplay">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ</div>

<div class="scrubber">
  <input type="range" id="scrubber" min="0" max="46" value="0">
  <span id="scrubberLabel">t=0 / 47</span>
</div>


<div style="width:100%;max-width:700px;margin:.5rem 0;padding:.5rem;border:1px solid rgba(44,62,107,.1);font-size:.6rem;letter-spacing:.06em;color:var(--dim)">
  <b style="text-transform:uppercase;letter-spacing:.1em">Dev Controls</b>
  <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px">
    <label>Cam X <input type="range" id="camX" min="-300" max="300" value="-200" style="width:80px" oninput="window._updateCam()"><span id="camXv">-200</span></label>
    <label>Cam Y <input type="range" id="camY" min="-200" max="200" value="20" style="width:80px" oninput="window._updateCam()"><span id="camYv">20</span></label>
    <label>Cam Z <input type="range" id="camZ" min="-300" max="300" value="0" style="width:80px" oninput="window._updateCam()"><span id="camZv">0</span></label>
    <label>FOV <input type="range" id="camFov" min="10" max="90" value="30" style="width:80px" oninput="window._updateCam()"><span id="camFovV">30</span></label>
    <label>Rotate <input type="checkbox" id="camRotate" onchange="window._toggleRotate()"> <span id="rotLabel">OFF</span></label>
    <label>Point Size <input type="range" id="ptSize" min="0.5" max="5" value="1.5" step="0.1" style="width:80px" oninput="window._updatePtSize()"><span id="ptSizeV">1.5</span></label>
    <label>Opacity <input type="range" id="brainOpacity" min="0.1" max="1" value="0.88" step="0.02" style="width:80px" oninput="window._updateOpacity()"><span id="opV">0.88</span></label>
    <label>BG <select id="bgColor" onchange="window._updateBg()"><option value="#f5f0e6">Paper</option><option value="#0d0d12">Dark</option><option value="#1a1a2e">Navy</option><option value="#ffffff">White</option></select></label>
  </div>
</div>
<p class="status" id="status">Select a surah to begin</p>
<audio id="audio" crossorigin="anonymous"></audio>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js'
import { OBJLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/OBJLoader.js'

// ── 3D Brain ──
let scene, camera, renderer, brainGroup, brain3dReady = false

async function initBrain() {
  const canvas = document.getElementById('brain3dCanvas')
  renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true })
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
  renderer.setClearColor(0xf5f0e6, 1)
  renderer.setSize(canvas.clientWidth, 400, false)

  scene = new THREE.Scene()
  camera = new THREE.PerspectiveCamera(30, canvas.clientWidth / 400, 0.1, 1000)
  camera.position.set(-200, 20, 0)
  camera.lookAt(0, 0, 0)

  scene.add(new THREE.AmbientLight(0xffffff, 0.5))
  const dir = new THREE.DirectionalLight(0xffffff, 0.8)
  dir.position.set(50, 80, 60)
  scene.add(dir)
  const backLight = new THREE.DirectionalLight(0x8090b0, 0.3); backLight.position.set(-30, -20, -40); scene.add(backLight)

  // Load raw vertex positions from OBJ (point cloud, no faces)
  const loader = new OBJLoader()
  const obj = await new Promise((res, rej) => loader.load('static/brain-andre.obj', res, undefined, rej))
  console.log('OBJ loaded:', obj.children.length, 'children')

  // obj is parsed data, not a THREE object — centering handled by geometry

  // Center the model
  // Center by averaging vertex positions
  let cx=0,cy=0,cz=0,n=0; obj.traverse(c=>{if(c.isMesh){const p=c.geometry.attributes.position;for(let i=0;i<p.count;i++){cx+=p.getX(i);cy+=p.getY(i);cz+=p.getZ(i);n++}}}); cx/=n;cy/=n;cz/=n
  const center = new THREE.Vector3(cx,cy,cz)
  obj.position.sub(center)
  
  // Set up per-vertex coloring on each mesh child
  obj.traverse(child => {
    if (child.isMesh) {
      const count = child.geometry.attributes.position.count
      const colors = new Float32Array(count * 3)
      for (let i = 0; i < count; i++) { colors[i*3]=0.75; colors[i*3+1]=0.7; colors[i*3+2]=0.65 }
      child.geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3))
      child.material = new THREE.MeshPhongMaterial({
        vertexColors: true, transparent: true, opacity: 0.88, shininess: 20, side: THREE.DoubleSide
      })
    }
  })
  
  brainGroup = obj
  scene.add(obj)
  brain3dReady = true
  renderer.render(scene, camera)
    console.log('3D brain loaded')
}

function updateBrain(brainState, time) {
  if (!brain3dReady || !brainGroup) return
  if (autoRotate) brainGroup.rotation.y += 0.003

  brainGroup.traverse(child => {
    if (!child.isMesh) return
    const pos = child.geometry.attributes.position
    const col = child.geometry.attributes.color
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i)
      let act = 0
      if (z > 10) act = brainState.contemplation || 0
      else if (z < -10) act = brainState.contemplation * 0.5 || 0
      else if (Math.abs(x) > 20 && y < 10) act = brainState.auditory || 0
      else if (y > 20) act = brainState.memory || 0
      else act = brainState.emotion || 0
      col.setXYZ(i, 0.75 + act*0.25, 0.7 - act*0.4, 0.65 - act*0.5)
    }
    col.needsUpdate = true
  })

  renderer.render(scene, camera)
}

// ── Brain Data ──
let brainData = null

async function loadBrainData(num) {
  try {
    const res = await fetch('brain-data/surah-' + num + '.json')
    if (res.ok) {
      brainData = await res.json()
      document.getElementById('status').textContent = 'TRIBE v2: ' + brainData.timesteps + ' timesteps × ' + brainData.vertices + ' vertices'
      document.getElementById('scrubber').max = brainData.timesteps - 1
    }
  } catch(e) { brainData = null }
}

function brainStateFromData(audioTime, duration) {
  if (!brainData) return { auditory:0.1, emotion:0.2, contemplation:0.3, memory:0.1 }
  const progress = duration > 0 ? audioTime / duration : 0
  const step = Math.min(Math.floor(progress * brainData.timesteps), brainData.timesteps - 1)
  const v = brainData.predictions[step] || []
  const avg = (a,b) => { let s=0; for(let i=a;i<Math.min(b,v.length);i++) s+=v[i]; return s/Math.max(1,b-a) }
  const norm = x => Math.max(0, Math.min(1, (x + 1.5) / 2.5))
  return {
    contemplation: norm(avg(0,40)),
    auditory: norm(avg(40,80)),
    memory: norm(avg(80,120)),
    emotion: norm(avg(160,205)),
    _step: step
  }
}

// ── Audio + Sync ──
let isPlaying = false, currentSurah = null, animFrame = null

async function loadSurah(num) {
  document.getElementById('status').textContent = 'Loading...'
  const [audioRes, versesRes] = await Promise.all([
    fetch('https://api.quran.com/api/v4/chapter_recitations/7/' + num),
    fetch('https://api.quran.com/api/v4/quran/verses/uthmani?chapter_number=' + num)
  ])
  const audioData = await audioRes.json()
  const versesData = await versesRes.json()
  return { audioUrl: audioData.audio_file?.audio_url, verses: versesData.verses || [] }
}

function animate(t) {
  if (!isPlaying) return
  const audio = document.getElementById('audio')
  const brain = brainStateFromData(audio.currentTime, audio.duration)

  // Update 3D brain
  updateBrain(brain, t)

  // Update frame render
  if (brainData) {
    const step = brain._step || 0
    const img = document.getElementById('brainFrame')
    const src = 'frames/frame-' + String(step).padStart(3, '0') + '.png'
    if (img.getAttribute('src') !== src) img.src = src
    document.getElementById('scrubber').value = step
    document.getElementById('scrubberLabel').textContent = 't=' + step + ' / ' + brainData.timesteps
  }

  // Update verse
  if (currentSurah?.verses) {
    const progress = audio.currentTime / (audio.duration || 1)
    const idx = Math.min(Math.floor(progress * currentSurah.verses.length), currentSurah.verses.length - 1)
    document.getElementById('verseDisplay').textContent = currentSurah.verses[idx]?.text_uthmani || ''
  }

  animFrame = requestAnimationFrame(animate)
}

window._togglePlay = async function() {
  const audio = document.getElementById('audio')
  const btn = document.getElementById('btnPlay')
  if (isPlaying) {
    audio.pause(); isPlaying = false; btn.textContent = '▶ Listen'
    cancelAnimationFrame(animFrame); return
  }
  const num = document.getElementById('surahSelect').value
  if (!currentSurah || currentSurah.num !== num) {
    const data = await loadSurah(num)
    currentSurah = { num, ...data }
    audio.src = data.audioUrl
    await loadBrainData(num)
  }
  await audio.play()
  isPlaying = true; btn.textContent = '⏸ Pause'
  animFrame = requestAnimationFrame(animate)
}

// Scrubber manual control
document.getElementById('scrubber').addEventListener('input', function() {
  const step = parseInt(this.value)
  const img = document.getElementById('brainFrame')
  img.src = 'frames/frame-' + String(step).padStart(3, '0') + '.png'
  document.getElementById('scrubberLabel').textContent = 't=' + step + ' / ' + (brainData?.timesteps || 47)
  // Also update 3D brain at this step
  if (brainData && brainData.predictions[step]) {
    const v = brainData.predictions[step]
    const avg = (a,b) => { let s=0; for(let i=a;i<Math.min(b,v.length);i++) s+=v[i]; return s/Math.max(1,b-a) }
    const norm = x => Math.max(0, Math.min(1, (x + 1.5) / 2.5))
    updateBrain({
      contemplation: norm(avg(0,40)),
      auditory: norm(avg(40,80)),
      memory: norm(avg(80,120)),
      emotion: norm(avg(160,205))
    }, performance.now())
  }
})


let autoRotate = false
window._updateCam = function() {
  if (!camera || !renderer) return
  camera.position.set(
    parseInt(document.getElementById('camX').value),
    parseInt(document.getElementById('camY').value),
    parseInt(document.getElementById('camZ').value)
  )
  camera.fov = parseInt(document.getElementById('camFov').value)
  camera.updateProjectionMatrix()
  camera.lookAt(0, 0, 0)
  renderer.render(scene, camera)
  document.getElementById('camXv').textContent = document.getElementById('camX').value
  document.getElementById('camYv').textContent = document.getElementById('camY').value
  document.getElementById('camZv').textContent = document.getElementById('camZ').value
  document.getElementById('camFovV').textContent = document.getElementById('camFov').value
}
window._toggleRotate = function() {
  autoRotate = document.getElementById('camRotate').checked
  document.getElementById('rotLabel').textContent = autoRotate ? 'ON' : 'OFF'
}
window._updatePtSize = function() {
  document.getElementById('ptSizeV').textContent = document.getElementById('ptSize').value
}
window._updateOpacity = function() {
  const op = parseFloat(document.getElementById('brainOpacity').value)
  document.getElementById('opV').textContent = op
  if (brainGroup) brainGroup.traverse(c => { if(c.isMesh) c.material.opacity = op })
  if (renderer) renderer.render(scene, camera)
}
window._updateBg = function() {
  const bg = document.getElementById('bgColor').value
  document.body.style.background = bg
  if (renderer) { renderer.setClearColor(bg); renderer.render(scene, camera) }
}

// Init 3D brain on load
initBrain().catch(e => console.error('Brain init failed:', e))
</script>
</body>
</html>
