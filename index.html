<!-- بسم الله الرحمن الرحيم -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Sakina — سكينة</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f0e6;--fg:rgba(40,32,24,.9);--dim:rgba(70,60,45,.5);--accent:#2c3e6b;--font:'Inter',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font-family:var(--font);font-size:16px;font-weight:300;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
h1{font-size:clamp(2rem,6vw,3.5rem);font-weight:200;letter-spacing:-.02em;text-align:center}
.arabic{font-size:clamp(1.5rem,4vw,2.5rem);color:var(--dim);margin-bottom:1rem;text-align:center}
.subtitle{font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:3rem;text-align:center}
.player{width:100%;max-width:600px;margin:2rem 0}
.surah-select{width:100%;padding:.8rem 1rem;font-family:var(--font);font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;background:rgba(44,62,107,.06);border:1px solid rgba(44,62,107,.15);color:var(--fg);cursor:pointer;appearance:none;-webkit-appearance:none}

/* ── Vis tabs ──────────────────────────────────────────── */
.vis-wrapper{width:100%;max-width:600px;margin:2rem 0}
.vis-tabs{display:flex;gap:0;margin-bottom:0;border-bottom:1px solid rgba(44,62,107,.14)}
.vis-tab{flex:1;padding:.5rem .4rem;font-family:var(--font);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;background:transparent;border:1px solid rgba(44,62,107,.12);border-bottom:none;color:var(--dim);cursor:pointer;transition:all .2s;text-align:center}
.vis-tab:first-child{border-left:1px solid rgba(44,62,107,.12)}
.vis-tab+.vis-tab{border-left:none}
.vis-tab.active{background:var(--accent);color:#f5f0e6;border-color:var(--accent)}
.vis-tab:hover:not(.active){background:rgba(44,62,107,.06);color:var(--fg)}

/* Shared panel */
.vis-panel{display:none;width:100%;aspect-ratio:1;position:relative;background:rgba(44,62,107,.02);border:1px solid rgba(44,62,107,.08);border-top:none}
.vis-panel.active{display:block}

/* Pattern panel keeps original SVG */
.vis-panel svg{width:100%;height:100%}

/* 3D canvas */

/* Flatmap panel */
#panelFlatmap svg{width:100%;height:100%}

/* TRIBE panel */
.tribe-wrap{width:100%;height:100%;display:flex;flex-direction:column}
.tribe-credit{font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);text-align:center;padding:.5rem;border-top:1px solid rgba(44,62,107,.1);background:rgba(44,62,107,.03)}

/* ── brain bar ────────────────────────────────────────── */
.brain-bar{display:flex;gap:4px;justify-content:center;margin:1rem 0;flex-wrap:wrap}
.brain-region{font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;padding:.3rem .6rem;border:1px solid rgba(44,62,107,.12);color:var(--dim);transition:all .3s}
.brain-region.active{background:var(--accent);color:#f5f0e6;border-color:var(--accent)}
.verse-display{text-align:center;font-size:clamp(1rem,3vw,1.5rem);color:var(--fg);margin:1.5rem 0;min-height:2em;direction:rtl;line-height:1.8}
.controls{display:flex;gap:1rem;align-items:center;justify-content:center;margin:1rem 0}
.controls button{padding:.6rem 1.5rem;font-family:var(--font);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;background:var(--accent);color:#f5f0e6;border:none;cursor:pointer;transition:opacity .2s}
.controls button:hover{opacity:.8}
.controls button.secondary{background:transparent;color:var(--accent);border:1px solid rgba(44,62,107,.2)}
.status{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);text-align:center;margin-top:1rem}
</style>
</head>
<body>

<div class="arabic">سكينة</div>
<h1>Sakina</h1>
<p class="subtitle">The neural landscape of Quran recitation</p>

<div class="player">
  <select class="surah-select" id="surahSelect">
    <option value="1">1 · Al-Fatiha — The Opening</option>
    <option value="36">36 · Ya-Sin — The Heart of the Quran</option>
    <option value="55">55 · Ar-Rahman — The Most Merciful</option>
    <option value="67">67 · Al-Mulk — The Sovereignty</option>
    <option value="112">112 · Al-Ikhlas — The Sincerity</option>
    <option value="113">113 · Al-Falaq — The Daybreak</option>
    <option value="114">114 · An-Nas — Mankind</option>
  </select>
</div>

<!-- ── Visualization area ──────────────────────────────── -->
<div class="vis-wrapper">
  <div class="vis-tabs">
        <button class="vis-tab active" data-panel="panelFlatmap" onclick="switchTab('panelFlatmap')">Flatmap</button>
    <button class="vis-tab" data-panel="panelTribe"   onclick="switchTab('panelTribe')">Brain Mesh</button>
    <button class="vis-tab" data-panel="panelPattern" onclick="switchTab('panelPattern')">Pattern</button>
  </div>

  <!-- A: 3D Brain -->
  

  <!-- B: Flatmap -->
  <div class="vis-panel active" id="panelFlatmap">
    <svg id="flatmapSvg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <!-- C: TRIBE v2 -->
  <div class="vis-panel" id="panelTribe">
    <canvas id="canvasBrainMap" style="width:100%;height:100%;display:block"></canvas>
    <div style="position:absolute;bottom:8px;left:12px;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)">
      FSAVERAGE5 CORTICAL MESH · 20,484 VERTICES · TRIBE V2 FORMAT
    </div>
  </div>
    </div>
  </div>

  <!-- D: Pattern (original) -->
  <div class="vis-panel" id="panelPattern">
    <svg id="visSvg" viewBox="0 0 400 400"></svg>
  </div>
</div>

<div class="verse-display" id="verseDisplay">
  بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ
</div>

<div class="brain-bar" id="brainBar">
  <span class="brain-region" data-region="auditory">Auditory</span>
  <span class="brain-region" data-region="language">Language</span>
  <span class="brain-region" data-region="emotion">Emotion</span>
  <span class="brain-region" data-region="contemplation">Contemplation</span>
  <span class="brain-region" data-region="memory">Memory</span>
</div>

<div class="controls">
  <button id="btnPlay" onclick="togglePlay()">▶ Listen</button>
  <button class="secondary" id="btnExport" onclick="exportPattern()">↓ SVG</button>
</div>

<p class="status" id="status">Select a surah to begin</p>

<audio id="audio" crossorigin="anonymous"></audio>

<script type="module">
import { initBrainMesh, updateBrainMesh, renderBrainMesh } from './brain-mesh-viewer.js'

const TAU = Math.PI * 2

// ── Tab system ────────────────────────────────────────────────
let activeTab = 'panelFlatmap'
let tribeLoaded  = false

window.switchTab = function(id) {
  document.querySelectorAll('.vis-panel').forEach(p => p.classList.remove('active'))
  document.querySelectorAll('.vis-tab').forEach(t => t.classList.remove('active'))
  document.getElementById(id).classList.add('active')
  document.querySelector(`[data-panel="${id}"]`).classList.add('active')
  activeTab = id

  if (id === 'panelTribe') {
    if (!window._brainMeshReady) {
      const canvas = document.getElementById('canvasBrainMap')
      if (canvas) {
        initBrainMesh(canvas).then(() => { window._brainMeshReady = true; renderBrainMesh() })
      }
    } else {
      updateBrainMesh(currentBrainState || {auditory:0.1,language:0.1,emotion:0.2,contemplation:0.5,memory:0.1}, performance.now())
    }
  } else {
    stopBrain3D()
  }

  if (id === 'panelTribe' && !tribeLoaded) {
    tribeLoaded = true
  }
}

// Resize 3D canvas when window resizes

// ── Quran.com API ─────────────────────────────────────────────
async function loadSurah(num) {
  document.getElementById('status').textContent = 'Loading surah ' + num + '...'
  const audioRes = await fetch('https://api.quran.com/api/v4/chapter_recitations/7/' + num)
  const audioData = await audioRes.json()
  const audioUrl = audioData.audio_file?.audio_url
  const versesRes = await fetch('https://api.quran.com/api/v4/quran/verses/uthmani?chapter_number=' + num)
  const versesData = await versesRes.json()
  return { audioUrl, verses: versesData.verses || [] }
}


// ── Real TRIBE v2 Brain Data ──
let brainData = null
let brainDataLoading = false

async function loadBrainData(surahNum) {
  brainDataLoading = true
  try {
    const res = await fetch('brain-data/surah-' + surahNum + '.json')
    if (res.ok) {
      brainData = await res.json()
      document.getElementById('status').textContent = 
        'TRIBE v2 brain data loaded — ' + brainData.timesteps + ' timesteps × ' + brainData.vertices + ' vertices (real predictions)'
      console.log('Brain data:', brainData.name, brainData.timesteps, '×', brainData.vertices)
    } else {
      brainData = null
      console.log('No brain data for surah', surahNum)
    }
  } catch(e) {
    brainData = null
    console.log('Brain data load error:', e)
  }
  brainDataLoading = false
}

function getBrainStateFromTribe(audioTime, duration) {
  if (!brainData || !brainData.predictions) return null
  // Map audio time to brain data timestep
  const progress = duration > 0 ? audioTime / duration : 0
  const step = Math.min(Math.floor(progress * brainData.timesteps), brainData.timesteps - 1)
  const vertices = brainData.predictions[step]
  if (!vertices) return null
  
  // Map vertex activations to brain regions
  // With 205 downsampled vertices, roughly:
  // 0-40: frontal (contemplation)
  // 40-80: temporal (auditory/language)  
  // 80-120: parietal (memory)
  // 120-160: occipital
  // 160-205: limbic/deep (emotion)
  const avg = (arr) => arr.reduce((a,b) => a+b, 0) / arr.length
  const norm = (v) => Math.max(0, Math.min(1, (v + 1) / 2)) // -1..1 → 0..1
  
  return {
    auditory: norm(avg(vertices.slice(40, 80))),
    language: norm(avg(vertices.slice(50, 90))),
    emotion: norm(avg(vertices.slice(160, 205))),
    contemplation: norm(avg(vertices.slice(0, 40))),
    memory: norm(avg(vertices.slice(80, 120))),
    _step: step,
    _total: brainData.timesteps,
    _raw: vertices
  }
}

// ── Audio Analysis ────────────────────────────────────────────
let audioCtx, analyser, source, dataArray
let isPlaying = false
let currentSurah = null

function setupAudio(audioEl) {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)()
    analyser = audioCtx.createAnalyser()
    analyser.fftSize = 256
    dataArray = new Uint8Array(analyser.frequencyBinCount)
  }
  if (source) source.disconnect()
  source = audioCtx.createMediaElementSource(audioEl)
  source.connect(analyser)
  analyser.connect(audioCtx.destination)
}


// Fallback when CORS blocks Web Audio analyser
function getFallbackFeatures() {
  const audio = document.getElementById('audio')
  if (!audio || audio.paused) return { energy: 0, bass: 0, mid: 0, high: 0, spectralCentroid: 0 }
  const t = audio.currentTime
  // Simulate brain-like oscillations based on time
  const breath = (Math.sin(t * 0.5) + 1) / 2  // slow breathing rhythm
  const pulse = (Math.sin(t * 2.3) + 1) / 2    // heartbeat-ish
  const recit = (Math.sin(t * 1.1) * Math.sin(t * 0.7) + 1) / 2  // recitation rhythm
  return {
    energy: 0.3 + recit * 0.4,
    bass: 0.2 + breath * 0.5,
    mid: 0.3 + pulse * 0.4,
    high: 0.1 + recit * 0.3,
    spectralCentroid: 0.3 + breath * 0.3
  }
}
function getAudioFeatures() {
  if (!analyser) return getFallbackFeatures()
  analyser.getByteFrequencyData(dataArray)
  // Check if we're getting actual data (CORS might block it)
  const hasData = dataArray.some(v => v > 0)
  if (!hasData) return getFallbackFeatures()
  const len = dataArray.length
  let sum = 0, bassSum = 0, midSum = 0, highSum = 0, weightedSum = 0
  for (let i = 0; i < len; i++) {
    const v = dataArray[i] / 255
    sum += v
    if (i < len * 0.15) bassSum += v
    else if (i < len * 0.5) midSum += v
    else highSum += v
    weightedSum += v * i
  }
  const energy = sum / len
  return {
    energy,
    bass:             bassSum / (len * 0.15),
    mid:              midSum  / (len * 0.35),
    high:             highSum / (len * 0.5),
    spectralCentroid: sum > 0 ? weightedSum / sum / len : 0
  }
}

// ── Neural proxy ──────────────────────────────────────────────
function audiaToBrainState(features) {
  return {
    auditory:      Math.min(1, features.energy * 2.5),
    language:      Math.min(1, features.mid    * 2),
    emotion:       Math.min(1, features.bass   * 1.8 + features.energy * 0.5),
    contemplation: Math.min(1, (1 - features.energy) * 0.8 + features.spectralCentroid * 0.5),
    memory:        Math.min(1, features.mid    * 0.6 + features.bass * 0.4)
  }
}

// Shared brain state — all visualisations read from this
let currentBrainState = { auditory: 0.1, language: 0.1, emotion: 0.2, contemplation: 0.6, memory: 0.1 }

// ── Pattern Generation (original) ────────────────────────────
function brainToPattern(brain, t) {
  const svg = document.getElementById('visSvg')
  const W = 400, cx = W/2, cy = W/2
  const fold     = Math.round(4 + brain.contemplation * 8)
  const density  = 0.3 + brain.auditory * 0.7
  const scale    = 60 + brain.emotion * 60
  const rotation = t * 0.001 * (1 + brain.language)
  let html = ''
  const R = scale * density
  const n = fold * 2
  for (let ring = 0; ring < 3; ring++) {
    const ringR     = R * (1 + ring * 0.6)
    const ringAlpha = (0.7 - ring * 0.2) * density
    for (let i = 0; i < n; i++) {
      const a1   = rotation + (i / n) * TAU
      const skip = Math.floor(n / 3)
      const a2   = rotation + (((i + skip) % n) / n) * TAU
      html += `<line x1="${(cx + Math.cos(a1)*ringR).toFixed(1)}" y1="${(cy + Math.sin(a1)*ringR).toFixed(1)}" x2="${(cx + Math.cos(a2)*ringR).toFixed(1)}" y2="${(cy + Math.sin(a2)*ringR).toFixed(1)}" stroke="var(--accent)" stroke-width="${(0.5 + brain.emotion).toFixed(1)}" opacity="${ringAlpha.toFixed(2)}"/>`
    }
    html += `<circle cx="${cx}" cy="${cy}" r="${ringR.toFixed(1)}" fill="none" stroke="rgba(44,62,107,${(0.1 + brain.contemplation * 0.15).toFixed(2)})" stroke-width="0.5"/>`
  }
  const pulseR = R * (0.3 + Math.sin(t * 0.003) * 0.1 * brain.auditory)
  html += `<circle cx="${cx}" cy="${cy}" r="${pulseR.toFixed(1)}" fill="none" stroke="var(--accent)" stroke-width="0.8" opacity="${(0.2 + brain.emotion * 0.3).toFixed(2)}"/>`
  svg.innerHTML = html
}

// ── Flatmap SVG ───────────────────────────────────────────────
// Region shapes: [cx, cy, rx, ry, label, labelDx, labelDy, key]
const FLAT_REGIONS = [
  // Frontal lobe — top / anterior
  { key: 'contemplation', cx: 200, cy: 110, rx: 80, ry: 58,  label: 'Frontal',  lx: 200, ly: 86  },
  // Temporal L — left
  { key: 'auditory',      cx: 82,  cy: 220, rx: 50, ry: 38,  label: 'Temporal L', lx: 50,  ly: 214 },
  // Temporal R / Wernicke — right
  { key: 'language',      cx: 318, cy: 220, rx: 50, ry: 38,  label: 'Temporal R', lx: 350, ly: 214 },
  // Limbic — central/inferior
  { key: 'emotion',       cx: 200, cy: 255, rx: 52, ry: 36,  label: 'Limbic',   lx: 200, ly: 250 },
  // Parietal — posterior
  { key: 'memory',        cx: 200, cy: 310, rx: 70, ry: 46,  label: 'Parietal', lx: 200, ly: 342 },
]

// Brain outline path (top-down stylised cortical view — rough ellipse with
// slight anterior narrowing and occipital pinch)
const BRAIN_OUTLINE = `
  M200,42
  C255,42 320,62 355,110
  C388,155 388,198 370,240
  C352,282 320,310 290,330
  C268,348 238,360 200,360
  C162,360 132,348 110,330
  C80,310 48,282 30,240
  C12,198 12,155 45,110
  C80,62 145,42 200,42Z
`

// Sulcus lines (few stylised fissures)
const SULCI = [
  // Central sulcus
  `M130,140 C160,170 200,175 270,140`,
  // Lateral (Sylvian) fissure L
  `M68,195 C95,195 110,220 120,248`,
  // Lateral (Sylvian) fissure R
  `M332,195 C305,195 290,220 280,248`,
  // Longitudinal midline
  `M200,42 C200,90 200,170 200,360`,
]

function drawFlatmap(brain) {
  const svg = document.getElementById('flatmapSvg')
  let html = ''

  // Background fill
  html += `<rect width="400" height="400" fill="#f5f0e6"/>`

  // Region fills (under outline)
  FLAT_REGIONS.forEach(r => {
    const v = Math.max(0, Math.min(1, brain[r.key] ?? 0))
    const a = (v * 0.55 + 0.04).toFixed(3)
    html += `<ellipse cx="${r.cx}" cy="${r.cy}" rx="${r.rx}" ry="${r.ry}" fill="rgba(44,62,107,${a})" />`
  })

  // Brain outline
  html += `<path d="${BRAIN_OUTLINE}" fill="none" stroke="rgba(44,62,107,0.45)" stroke-width="1.2"/>`

  // Sulci
  SULCI.forEach(d => {
    html += `<path d="${d}" fill="none" stroke="rgba(44,62,107,0.18)" stroke-width="0.7"/>`
  })

  // Region labels + activation value
  FLAT_REGIONS.forEach(r => {
    const v  = Math.max(0, Math.min(1, brain[r.key] ?? 0))
    const pct = Math.round(v * 100)
    const bright = v > 0.35
    const tc = bright ? '#f5f0e6' : 'rgba(44,62,107,0.65)'

    html += `<text x="${r.lx}" y="${r.ly}" text-anchor="middle" font-family="Inter,sans-serif" font-size="7.5" font-weight="300" letter-spacing="1.4" fill="${tc}" text-transform="uppercase">${r.label.toUpperCase()}</text>`
    html += `<text x="${r.lx}" y="${r.ly + 11}" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="300" fill="${tc}" opacity="0.8">${pct}%</text>`
  })

  // Annotation lines + formula block (architectural style)
  const legendX = 10, legendY = 372
  html += `<text x="${legendX}" y="${legendY}" font-family="Inter,sans-serif" font-size="6.5" font-weight="300" letter-spacing="0.9" fill="rgba(44,62,107,0.4)">ACTIVATION  f(x) = Σ ω·FFT → [0,1]</text>`

  // Small tick marks for each region on the right edge
  FLAT_REGIONS.forEach((r, i) => {
    const v   = Math.max(0, Math.min(1, brain[r.key] ?? 0))
    const pct = Math.round(v * 100)
    const ty  = 62 + i * 18
    const barW = v * 44
    html += `<text x="369" y="${ty}" font-family="Inter,sans-serif" font-size="5.8" font-weight="300" letter-spacing="0.8" fill="rgba(44,62,107,0.45)">${r.label.split(' ')[0].toUpperCase()}</text>`
    html += `<rect x="369" y="${ty + 2}" width="44" height="2.5" fill="rgba(44,62,107,0.1)"/>`
    html += `<rect x="369" y="${ty + 2}" width="${barW.toFixed(1)}" height="2.5" fill="rgba(44,62,107,0.55)"/>`
  })

  // Title
  html += `<text x="200" y="20" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" font-weight="300" letter-spacing="2" fill="rgba(44,62,107,0.38)">CORTICAL ACTIVATION MAP</text>`

  svg.innerHTML = html
}

// ── Brain bar UI ──────────────────────────────────────────────
function updateBrainBar(brain) {
  document.querySelectorAll('.brain-region').forEach(el => {
    const region = el.dataset.region
    const val    = brain[region] || 0
    el.classList.toggle('active', val > 0.3)
    el.style.opacity = 0.3 + val * 0.7
  })
}

// ── Animation loop ────────────────────────────────────────────
let animFrame
function animate(t) {
  if (!isPlaying) return
  const audio = document.getElementById('audio')
  const tribeBrain = getBrainStateFromTribe(audio.currentTime, audio.duration)
  let brain
  if (tribeBrain) {
    brain = tribeBrain
  } else {
    const features = getAudioFeatures()
    brain = audiaToBrainState(features)
  }
  currentBrainState = brain

  if (activeTab === 'panelPattern') brainToPattern(brain, t)
  if (activeTab === 'panelFlatmap') drawFlatmap(brain)

  updateBrainBar(brain)
  animFrame = requestAnimationFrame(animate)
}

// ── Controls ──────────────────────────────────────────────────
window.togglePlay = async function() {
  const audioEl = document.getElementById('audio')
  const btn     = document.getElementById('btnPlay')

  if (isPlaying) {
    audioEl.pause()
    isPlaying = false
    btn.textContent = '▶ Listen'
    cancelAnimationFrame(animFrame)
    document.getElementById('status').textContent = 'Paused'
    return
  }

  const surahNum = document.getElementById('surahSelect').value

  if (!currentSurah || currentSurah.num !== surahNum) {
    const data = await loadSurah(surahNum)
    currentSurah = { num: surahNum, ...data }
    loadBrainData(surahNum)
    audioEl.src  = data.audioUrl
    if (data.verses.length > 0) {
      document.getElementById('verseDisplay').textContent = data.verses[0].text_uthmani
    }
    setupAudio(audioEl)
  }

  await audioEl.play()
  isPlaying = true
  btn.textContent = '⏸ Pause'
  document.getElementById('status').textContent = 'Listening — neural response simulated (Phase 1)'
  animFrame = requestAnimationFrame(animate)
}

window.exportPattern = function() {
  const svg  = document.getElementById('visSvg')
  const blob = new Blob([svg.outerHTML], { type: 'image/svg+xml' })
  const a    = document.createElement('a')
  a.href     = URL.createObjectURL(blob)
  a.download = 'sakina-pattern.svg'
  a.click()
}

document.getElementById('audio').addEventListener('timeupdate', function() {
  if (!currentSurah?.verses) return
  const progress  = this.currentTime / (this.duration || 1)
  const verseIdx  = Math.min(Math.floor(progress * currentSurah.verses.length), currentSurah.verses.length - 1)
  document.getElementById('verseDisplay').textContent = currentSurah.verses[verseIdx]?.text_uthmani || ''
})

// ── Idle render ───────────────────────────────────────────────
brainToPattern(currentBrainState, 0)
drawFlatmap(currentBrainState)
</script>

</body>
</html>
